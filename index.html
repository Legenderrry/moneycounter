<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>💰 Wealth Flow Engine</title>

<style>
body {
  margin:0;
  background:#0b0f14;
  color:#00ff88;
  font-family:monospace;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card {
  width:92%;
  max-width:640px;
  background:#111826;
  padding:20px;
  border-radius:16px;
  border:1px solid #1f2a3a;
}

h1 { font-size:15px; color:#8aa4c7; }
.subtitle { font-size:12px; color:#7f8fa6; margin-bottom:10px; }

.banner {
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  text-align:center;
  font-weight:bold;
  white-space:pre-line;
}

.banner.early { background:#5a3e00; color:#ffd166; }
.banner.after { background:#4a1111; color:#ff6b6b; }
.banner.weekend { background:#2d1245; color:#d0a6ff; }

.money { font-size:42px; font-weight:bold; }
.net { font-size:22px; color:#4dd2ff; }

.row { display:flex; gap:10px; margin-bottom:10px; }

input, select, button {
  flex:1;
  padding:10px;
  background:#0c1320;
  border:1px solid #2a3a4d;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

button:disabled {
  opacity:0.35;
  cursor:not-allowed;
}

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.box {
  background:#0c1320;
  padding:10px;
  border-radius:10px;
  border:1px solid #1f2a3a;
}

.label { font-size:12px; color:#7f8fa6; }
.value { font-size:14px; color:white; }

.small { font-size:12px; color:#8aa4c7; margin-top:5px; }
</style>
</head>

<body>

<div class="card">

<h1>💰 Wealth Flow Engine</h1>
<div class="subtitle">Live → Daily → Weekly progression system</div>

<div id="banner" class="banner"></div>

<div class="row">
  <select id="mode">
    <option value="salary">Yearly Salary</option>
    <option value="hourly">Hourly Rate</option>
  </select>
  <input id="income" type="number" value="80000"/>
</div>

<div class="row">
  <button id="slackBtn" onclick="startSlacking()">🐟 摸鱼时间</button>
  <button id="backBtn" onclick="stopSlacking()">🐂🐎 Back to Work</button>
  <button onclick="clearSlack()">🧹 Clear Slack</button>
</div>

<div id="gross" class="money">$0.0000</div>
<div id="net" class="net">$0.0000</div>

<div id="actual" class="small"></div>
<div id="slack" class="small"></div>

<div id="clock" class="small"></div>
<div id="progress" class="small"></div>
<div id="countdown" class="small"></div>

<div class="grid">
  <div class="box">
    <div class="label" id="grossLabel">Today Gross</div>
    <div id="dailyGross" class="value"></div>
  </div>

  <div class="box">
    <div class="label" id="netLabel">Today Net</div>
    <div id="dailyNet" class="value"></div>
  </div>

  <div class="box">
    <div class="label">Hourly</div>
    <div id="hourly" class="value"></div>
  </div>

  <div class="box">
    <div class="label">Actual Hourly</div>
    <div id="netHourly" class="value"></div>
  </div>
</div>

</div>

<script>
function el(id){ return document.getElementById(id); }

/* ================= RATE ================= */
function ratePerSecond(){
  const v=parseFloat(el("income").value||0);
  const mode=el("mode").value;
  const hourly=(mode==="salary")?v/2080:v;
  return hourly/3600;
}

/* ================= TIME ================= */
function isWeekday(d){ return d.getDay()>=1 && d.getDay()<=5; }
function isWorkHours(d){ return d.getHours()>=9 && d.getHours()<17; }
function isWorkingNow(d){ return isWeekday(d) && isWorkHours(d); }

function workedSeconds(now){
  const s=new Date(now); s.setHours(9,0,0,0);
  const e=new Date(now); e.setHours(17,0,0,0);
  if(now<s) return 0;
  return ((now>e?e:now)-s)/1000;
}

/* ================= SLACK ================= */
let slackStart=null;
let totalSlackMs=0;

function startSlacking(){
  if(!slackStart) slackStart = performance.now();
}

function stopSlacking(){
  if(slackStart){
    totalSlackMs += performance.now()-slackStart;
    slackStart=null;
  }
}

function clearSlack(){
  totalSlackMs = 0;
  slackStart = null;
}

/* ================= TAX ================= */
function federalTax(x){
  const b=[[55867,0.15],[111733,0.205],[173205,0.26],[246752,0.29],[Infinity,0.33]];
  let p=0,t=0;
  for(const [l,r] of b){
    if(x>l){t+=(l-p)*r;p=l;}
    else {t+=(x-p)*r;break;}
  }
  return t;
}

function ontarioTax(x){
  const b=[[51446,0.0505],[102894,0.0915],[150000,0.1116],[220000,0.1216],[Infinity,0.1316]];
  let p=0,t=0;
  for(const [l,r] of b){
    if(x>l){t+=(l-p)*r;p=l;}
    else {t+=(x-p)*r;break;}
  }
  return t;
}

function deductions(a){
  return federalTax(a)+ontarioTax(a)+Math.min(a*0.0595,4500)+Math.min(a*0.0163,1123);
}

/* ================= WEEK CALC ================= */
function weeklyGross(annualGross){
  return annualGross / 52;
}
function weeklyNet(annualNet){
  return annualNet / 52;
}

/* ================= BANNER SYSTEM ================= */
function updateBanner(now, mode, gross, net){

  const b = el("banner");
  const d = now.getDay();
  const h = now.getHours();

  b.className = "banner";

  const annual = gross * 260;
  const annNet = annual - deductions(annual);

  const dailyFinalGross = annual / 260;
  const dailyFinalNet = annNet / 260;

  const weekGross = weeklyGross(annual);
  const weekNet = weeklyNet(annNet);

  /* WEEKEND MODE */
  if(d === 0 || d === 6){
    b.classList.add("weekend");
    b.innerText =
`🍻 GET A LIFE! NO WORK ON WEEKENDS!

Week Completed ✅

Gross This Week: $${weekGross.toFixed(4)}
Net This Week:   $${weekNet.toFixed(4)}

Hours Worked: 40.0
Avg Hourly: ${(weekGross/40).toFixed(2)}

Next Workday: Monday 9:00 AM`;
    return;
  }

  /* BEFORE 9AM */
  if(h < 9){
    b.classList.add("early");
    b.innerText = "☕ TOO EARLY, GO GET A COFFEE!";
    return;
  }

  /* AFTER 5PM */
  if(h >= 17){
    b.classList.add("after");
    b.innerText =
`🚨 STOP WORKING! IT'S AFTER HOURS!

Today's Final Earnings
Gross: $${dailyFinalGross.toFixed(4)}
Net:   $${dailyFinalNet.toFixed(4)}`;
    return;
  }

  /* DURING WORK */
  b.innerText = "";
}

/* ================= BUTTON LOCK ================= */
function updateButtons(now){
  const active = isWorkingNow(now);

  el("slackBtn").disabled = !active;
  el("backBtn").disabled = !active;
}

/* ================= MAIN LOOP ================= */
function update(){

  const now = new Date();
  updateButtons(now);

  const rate = ratePerSecond();
  const workSec = workedSeconds(now);
  const gross = workSec * rate;

  const annualGross = gross * 260;
  const annualNet = annualGross - deductions(annualGross);

  const net = annualNet / 260;

  /* SLACK */
  let slackMs = totalSlackMs;
  if(slackStart) slackMs += performance.now()-slackStart;

  const slackSec = slackMs / 1000;

  const effectiveHours = Math.max((workSec - slackSec)/3600, 0.01);
  const actualHourly = gross / effectiveHours;

  el("gross").innerText = "$" + gross.toFixed(4);
  el("net").innerText = "$" + net.toFixed(4);

  el("dailyGross").innerText = "$" + gross.toFixed(4);
  el("dailyNet").innerText = "$" + net.toFixed(4);

  el("hourly").innerText = "$" + (rate*3600).toFixed(2);
  el("netHourly").innerText = "$" + actualHourly.toFixed(2);

  el("actual").innerText =
    "📉 Actual hourly (after slacking): $" + actualHourly.toFixed(2);

  el("slack").innerText =
    "🐟 Slacking: " + slackSec.toFixed(3) + " sec";

  el("clock").innerText =
    "🕒 " + now.toLocaleTimeString();

  const s = new Date(now); s.setHours(9,0,0,0);
  const e = new Date(now); e.setHours(17,0,0,0);

  const prog = now<s?0:now>e?100:((now-s)/(e-s))*100;
  el("progress").innerText =
    "📊 Workday: " + prog.toFixed(1) + "%";

  el("countdown").innerText =
    now>e ? "🎉 Done for today" :
    Math.floor((e-now)/3600000) + "h left";

  updateBanner(now, null, gross, net);

  requestAnimationFrame(update);
}

update();
</script>

</body>
</html>
